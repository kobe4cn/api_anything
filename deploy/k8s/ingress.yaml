apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-anything
  namespace: api-anything
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api-anything.example.com
      secretName: api-anything-tls
  rules:
    - host: api-anything.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-anything
                port:
                  number: 8080
